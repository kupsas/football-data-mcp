[tox]
isolated_build = true
envlist = py310, py311, py312, py313

[testenv]
usedevelop = true
extras = test
allowlist_externals = uv, sphinx-build
install_command = uv pip install

[testenv:test-all]
commands =
    python -m pip list
    pytest ./test/ -m "not integration and not contract"

[testenv:test-capology]
commands =
    pip list
    pytest ./test/test_capology.py

[testenv:test-clubelo]
commands =
    pip list
    python -c "import subprocess,sys;c=subprocess.run([sys.executable,'-m','pytest','./test/test_clubelo.py','-m','not integration']);sys.exit(0 if c.returncode in (0,5) else c.returncode)"

[testenv:test-botasaurus]
commands =
    pip list
    pytest ./test/test_botasaurus_getters.py

[testenv:test-sofascore]
commands =
    pip list
    pytest ./test/test_sofascore.py -m "not integration"

[testenv:test-transfermarkt]
commands =
    pip list
    python -c "import subprocess,sys;c=subprocess.run([sys.executable,'-m','pytest','./test/test_transfermarkt.py','-m','not integration']);sys.exit(0 if c.returncode in (0,5) else c.returncode)"

[testenv:test-understat]
commands =
    pip list
    python -c "import subprocess,sys;c=subprocess.run([sys.executable,'-m','pytest','./test/test_understat.py','-m','not integration']);sys.exit(0 if c.returncode in (0,5) else c.returncode)"

[testenv:contract]
commands =
    pip list
    pytest ./test/contract/ -m contract

[testenv:docs]
extras = docs
commands = sphinx-build -nWEa --keep-going -b html ./docs/source/ ./docs/build/

[testenv:build]
skip_install = true
extras = build
commands = uv build

[testenv:lint]
extras = lint
commands =
    ruff check --select W291 --fix --unsafe-fixes # fix trailing whitespace
    ruff check --select W292 --fix  # fix missing new line at end of file
    ruff check --select W293 --fix --unsafe-fixes  # fix blank line with whitespace
    ruff check

[testenv:doclint]
extras = lint
commands =
    pydoclint --config=.\pydoclint.toml .\src
    sphinx-lint ./docs/source

[testenv:typecheck]
extras = typecheck
commands = mypy ./src
