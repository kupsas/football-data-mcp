[pytest]
addopts = ["-s", "-v", "--cov=ScraperFC", "--cov=collect_data"]
norecursedirs = ["docs", "*.egg-info", ".git", ".tox"]
markers = [
    "integration: live network / headless Chrome (skip in CI with -m 'not integration')",
    "contract: minimal upstream shape checks (rate-limited; skip with -m 'not contract')",
]
